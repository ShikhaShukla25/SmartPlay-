<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake Bite Survival Challenge</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at center, #5aa03b, #2b5329);
      background-image: 
        radial-gradient(rgba(0, 0, 0, 0.15) 10%, transparent 10%),
        radial-gradient(rgba(0, 0, 0, 0.15) 10%, transparent 10%);
      background-size: 60px 60px;
      background-position: 0 0, 30px 30px;
      color: #fff;
      text-align: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-size: 2em;
      margin-bottom: 20px;
      color: #fff;
      text-shadow: 2px 2px #1b3519;
    }

    #quiz-container {
      background: rgba(0, 0, 0, 0.4);
      border: 3px solid #1b3519;
      border-radius: 15px;
      padding: 30px;
      width: 90%;
      max-width: 500px;
      margin: auto;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.6);
    }

    .btn {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 12px;
      font-size: 1.1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      background-color: #4CAF50;
      color: white;
    }

    .btn:hover {
      background-color: #6bff6b;
      color: black;
    }

    #score {
      position: absolute;
      top: 15px;
      right: 20px;
      background: #1b3519;
      padding: 10px 15px;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.4);
    }

    #next-btn, #restart-btn {
      background-color: #ffb703;
      color: #000;
    }

    #next-btn:hover, #restart-btn:hover {
      background-color: #ffd166;
    }

    #message {
      font-size: 1.2em;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div id="score">Score: 0</div>

  <div id="quiz-container">
    <h1>🐍 Snake Bite Survival Challenge</h1>
    <p id="question">Oh no! Your friend got bitten by a snake! Let’s see if you can make the right choices.</p>
    <div id="options"></div>
    <button id="next-btn" style="display:none;">Next</button>
    <button id="restart-btn" style="display:none;">Play Again</button>
    <p id="message"></p>
  </div>

  <script>
    const questions = [
      {
        question: "What should you do first when someone is bitten by a snake?",
        options: ["Make the person run to hospital", "Suck out the venom", "Keep the person calm and still", "Cut the wound to remove poison"],
        answer: 2
      },
      {
        question: "What should you avoid after a snake bite?",
        options: ["Wash with soap and water", "Catch the snake", "Keep the person calm", "Remove tight clothing"],
        answer: 1
      },
      {
        question: "What is the best next step after first aid?",
        options: ["Give them water", "Wait for symptoms", "Take them to the hospital immediately", "Tie the wound tightly"],
        answer: 2
      },
      {
        question: "What should you not do while waiting for help?",
        options: ["Keep the person lying down", "Give food or drink", "Keep bite area below heart", "Remove jewelry near bite"],
        answer: 1
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const restartBtn = document.getElementById("restart-btn");
    const scoreEl = document.getElementById("score");
    const messageEl = document.getElementById("message");

    function loadQuestion() {
      const q = questions[currentQuestion];
      questionEl.textContent = q.question;
      optionsEl.innerHTML = "";
      q.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.textContent = option;
        button.classList.add("btn");
        button.addEventListener("click", () => selectOption(index));
        optionsEl.appendChild(button);
      });
      nextBtn.style.display = "none";
    }

    function selectOption(selected) {
      const correct = questions[currentQuestion].answer;
      const buttons = document.querySelectorAll(".btn");
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === correct) btn.style.backgroundColor = "#4CAF50";
        else if (i === selected) btn.style.backgroundColor = "#e63946";
      });

      if (selected === correct) {
        score++;
        scoreEl.textContent = "Score: " + score;
      }
      nextBtn.style.display = "block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    });

    function showResult() {
      questionEl.textContent = "Quiz Completed!";
      optionsEl.innerHTML = "";
      nextBtn.style.display = "none";
      restartBtn.style.display = "block";
      if (score >= 3) {
        messageEl.textContent = "🎉 Great job! You saved your friend!";
      } else {
        messageEl.textContent = "😅 Not bad! Learn more and try again!";
      }
    }

    restartBtn.addEventListener("click", () => {
      currentQuestion = 0;
      score = 0;
      scoreEl.textContent = "Score: 0";
      restartBtn.style.display = "none";
      messageEl.textContent = "";
      loadQuestion();
    });

    loadQuestion();
  </script>
</body>
</html>
